jpeg_quality = 80

[serve]
    as = "WEBP"
    quality = 90.0

[tags]
    # File Uploads
    [tags.attachments]
        max_size = 20000000

    # User Avatars
    [tags.avatars]
        max_size = 4000000
        restrict_content_type = "Image"

    # User Profile Backgrounds
    [tags.backgrounds]
        max_size = 6000000
        restrict_content_type = "Image"

    # Channel / Server Icons
    [tags.icons]
        max_size = 2500000
        restrict_content_type = "Image"

    # Banners
    [tags.banners]
        max_size = 6000000
        restrict_content_type = "Image"

    # Emoji
    [tags.emojis]
        use_ulid = true
        max_size = 500000
        restrict_content_type = "Image"
        serve_if_field_present = ["object_id"]

    # Book pipeline artifacts (extracts, rosters, headshots, videos, etc.)
    [tags.books]
        use_ulid = true
        max_size = 524288000
